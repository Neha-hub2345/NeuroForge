spring.application.name=NeuroForge
server.port=9000

# --- Database ---
# CHANGED: was likely jdbc:postgresql://localhost:5432/... when you were
# running Postgres directly on your machine. Now it's the compose
# service name "postgres" â Docker's internal DNS resolves that to the
# postgres container automatically. This only works because the backend
# ITSELF now also runs inside the same compose network; if you ever run
# the backend outside Docker again (e.g. `./mvnw spring-boot:run` on your
# host) while Postgres is in Docker, you'd need localhost:5432 again,
# since your host machine has no idea what "postgres" means.




spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/neuroforge_nexus}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- Keycloak ---
# REMOVED the old single "issuer-uri" property â it forced key-fetching
# and issuer validation to use the same URL, which breaks once both
# Keycloak and the backend are in Docker but the browser is outside it.
# Replaced with two separate values (see SecurityConfig-addition.txt for
# the manual JwtDecoder bean this requires):
app.keycloak.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/neuroforge-nexus/protocol/openid-connect/certs}
app.keycloak.issuer=${KEYCLOAK_ISSUER:http://localhost:8080/realms/neuroforge-nexus}

# --- Keycloak Admin API (only if you've wired up server-side role sync) ---
keycloak.admin.server-url=${KEYCLOAK_ADMIN_SERVER_URL:http://localhost:8080}
keycloak.admin.realm=neuroforge-nexus
keycloak.admin.client-id=neuroforge-admin-client

# --- Kafka ---
# CHANGED: was localhost:9092 when both your backend and Kafka ran
# directly on your machine. Now it's the compose service name, same
# reasoning as the database URL above.
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.group-id=neuroforge-task-events-group
spring.kafka.consumer.auto-offset-reset=earliest
